<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<title>Mi cuenta - genMyTee</title>
<meta name="description" content="Tu perfil en genMyTee. Historial de diseños y pedidos."/>
<meta name="robots" content="noindex"/>
<link rel="canonical" href="https://genmytee.com/mi-cuenta.html"/>
<link rel="stylesheet" href="/fonts/fonts.css"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/components.css"/>
<link rel="stylesheet" href="/css/auth.css"/>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NAV -->
<nav>
  <div class="nav-top">
    <a href="/" class="nav-logo">genMyTee</a>
    <ul class="nav-center">
      <li><a href="/#galeria">Galería</a></li>
      <li><a href="/#productos">Prendas</a></li>
      <li><a href="/#creador">Crear mi prenda</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-btn" onclick="window.location.href='/'" title="Inicio">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      </button>
    </div>
  </div>
</nav>

<!-- PROFILE PAGE -->
<div class="profile-page" id="profilePage">
  <div id="profileLoading" style="text-align:center;padding:4rem;color:var(--muted)">
    Cargando...
  </div>

  <div id="profileContent" style="display:none">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">U</div>
      <div class="profile-info">
        <h1 id="profileName">Usuario</h1>
        <p id="profileEmail">email@example.com</p>
      </div>
    </div>

    <div class="profile-stats" id="profileStats">
      <div class="profile-stat">
        <div class="profile-stat-value" id="statDesigns">0</div>
        <div class="profile-stat-label">Diseños creados</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-value" id="statOrders">--</div>
        <div class="profile-stat-label">Pedidos</div>
      </div>
    </div>

    <div id="verificationBanner" style="display:none">
      <div style="background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.2);border-radius:10px;padding:1rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.75rem;">
        <span style="font-size:1.2rem;">&#x26A0;&#xFE0F;</span>
        <div>
          <p style="color:var(--text);font-size:0.85rem;margin:0;">Tu email no está verificado.</p>
          <button onclick="requestVerification()" style="background:none;border:none;color:var(--accent);font-size:0.8rem;cursor:pointer;padding:0;margin-top:0.25rem;text-decoration:underline;">
            Enviar código de verificación
          </button>
        </div>
      </div>
    </div>

    <h3 class="profile-section-title">Mis diseños</h3>
    <div class="profile-designs-grid" id="designsGrid"></div>
    <div class="profile-empty" id="designsEmpty" style="display:none">
      <p>Aún no has creado ningún diseño.</p>
      <a href="/#creador" class="profile-btn" style="display:inline-block;text-decoration:none;">Crear mi primer diseño</a>
    </div>

    <div class="profile-actions" style="margin-top:3rem;">
      <button class="profile-btn danger" onclick="handleLogout()">Cerrar sesión</button>
    </div>
  </div>

  <div id="profileNotAuth" style="display:none;text-align:center;padding:4rem;">
    <h2 style="color:var(--text);margin-bottom:1rem;">Inicia sesión para ver tu perfil</h2>
    <button class="profile-btn" onclick="openAuthModal('login')" style="background:var(--accent);color:#fff;border:none;">Iniciar sesión</button>
  </div>
</div>

<!-- WHATSAPP WIDGET -->
<a href="https://wa.me/34600000000?text=Hola%2C%20tengo%20una%20duda%20sobre%20genMyTee" class="whatsapp-widget" target="_blank" rel="noopener" title="Escríbenos por WhatsApp" aria-label="Contactar por WhatsApp">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
<script>
async function loadProfile() {
  try {
    const res = await fetch("/api/auth/me", { credentials: "include" });
    const data = await res.json();

    document.getElementById("profileLoading").style.display = "none";

    if (!data.authenticated || !data.user) {
      document.getElementById("profileNotAuth").style.display = "";
      return;
    }

    document.getElementById("profileContent").style.display = "";

    const user = data.user;
    const nameEl = document.getElementById("profileName");
    const emailEl = document.getElementById("profileEmail");
    const avatarEl = document.getElementById("profileAvatar");

    nameEl.textContent = user.name || "Usuario";
    if (user.email_verified) {
      nameEl.innerHTML += ' <span class="profile-badge verified">Verificado</span>';
    } else {
      nameEl.innerHTML += ' <span class="profile-badge unverified">Sin verificar</span>';
      document.getElementById("verificationBanner").style.display = "";
    }
    emailEl.textContent = user.email;

    if (user.avatar_url && user.avatar_url.startsWith("https://")) {
      const avatarImg = document.createElement("img");
      avatarImg.src = user.avatar_url;
      avatarImg.alt = "";
      avatarEl.textContent = "";
      avatarEl.appendChild(avatarImg);
    } else {
      avatarEl.textContent = (user.name || user.email || "U")[0].toUpperCase();
    }

    // Load designs
    const designsRes = await fetch("/api/profile/designs?limit=50", { credentials: "include" });
    const designsData = await designsRes.json();

    document.getElementById("statDesigns").textContent = designsData.total || 0;

    const grid = document.getElementById("designsGrid");
    if (designsData.designs && designsData.designs.length > 0) {
      grid.innerHTML = "";
      for (const d of designsData.designs) {
        const card = document.createElement("div");
        card.className = "profile-design-card";
        if (d.preview_url) {
          const img = document.createElement("img");
          img.src = d.preview_url;
          img.setAttribute("alt", d.prompt || "");
          img.loading = "lazy";
          card.appendChild(img);
        } else {
          const placeholder = document.createElement("div");
          placeholder.style.cssText = "aspect-ratio:1;background:var(--surface-alt);display:flex;align-items:center;justify-content:center;color:var(--muted);";
          placeholder.textContent = "Sin imagen";
          card.appendChild(placeholder);
        }
        const promptDiv = document.createElement("div");
        promptDiv.className = "design-prompt";
        promptDiv.textContent = d.prompt || "";
        card.appendChild(promptDiv);
        grid.appendChild(card);
      }
    } else {
      document.getElementById("designsEmpty").style.display = "";
    }
  } catch (err) {
    document.getElementById("profileLoading").textContent = "Error al cargar el perfil.";
  }
}

async function requestVerification() {
  try {
    const res = await fetch("/api/auth/verify-email/send", { method: "POST", credentials: "include" });
    const data = await res.json();
    if (data.ok) {
      if (typeof showToast === "function") showToast("Código de verificación enviado a tu email");
    } else {
      if (typeof showToast === "function") showToast(data.error || "Error al enviar el código");
    }
  } catch (_) {
    if (typeof showToast === "function") showToast("Error al enviar el código");
  }
}

document.addEventListener("DOMContentLoaded", loadProfile);
</script>
</body>
</html>
