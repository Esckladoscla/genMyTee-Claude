<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <title>genMyTee Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #818cf8;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
    }
    .auth-gate input {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
      width: 300px;
    }
    .auth-gate button {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    .dashboard { display: none; padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .dashboard.visible { display: block; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    header h1 { font-size: 1.5rem; }
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .status-badge.on { background: rgba(74, 222, 128, 0.2); color: var(--green); }
    .status-badge.off { background: rgba(248, 113, 113, 0.2); color: var(--red); }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .kpi-card .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .kpi-card .value { font-size: 1.75rem; font-weight: 700; margin-top: 0.25rem; }
    .kpi-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .chart-card h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 1rem; }
    .refresh-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .refresh-btn:hover { border-color: var(--accent); }
    .error-msg { color: var(--red); text-align: center; margin-top: 1rem; }
    @media (max-width: 600px) {
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="authGate" class="auth-gate">
    <h2>Admin Dashboard</h2>
    <input type="password" id="secretInput" placeholder="Admin secret" autocomplete="off">
    <button onclick="authenticate()">Entrar</button>
    <div id="authError" class="error-msg"></div>
  </div>

  <div id="dashboard" class="dashboard">
    <header>
      <h1>genMyTee Dashboard</h1>
      <div style="display:flex; gap:0.75rem; align-items:center;">
        <span id="aiStatus" class="status-badge">--</span>
        <button class="refresh-btn" onclick="loadDashboard()">Actualizar</button>
      </div>
    </header>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="label">Revenue (total)</div>
        <div class="value" id="kpiRevenue">--</div>
        <div class="sub" id="kpiRevenue30d">--</div>
      </div>
      <div class="kpi-card">
        <div class="label">Pedidos completados</div>
        <div class="value" id="kpiOrders">--</div>
        <div class="sub" id="kpiOrders7d">--</div>
      </div>
      <div class="kpi-card">
        <div class="label">Generaciones (hora actual)</div>
        <div class="value" id="kpiGenHour">--</div>
        <div class="sub" id="kpiGenThreshold">--</div>
      </div>
      <div class="kpi-card">
        <div class="label">Tasa de conversion</div>
        <div class="value" id="kpiConversion">--</div>
        <div class="sub" id="kpiConversionDetail">--</div>
      </div>
      <div class="kpi-card">
        <div class="label">Coste API estimado</div>
        <div class="value" id="kpiCost">--</div>
        <div class="sub" id="kpiCostDetail">--</div>
      </div>
      <div class="kpi-card">
        <div class="label">Sesiones / Emails</div>
        <div class="value" id="kpiSessions">--</div>
        <div class="sub" id="kpiUniqueIps">--</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h3>Pedidos diarios (30d)</h3>
        <canvas id="ordersChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Generaciones por hora</h3>
        <canvas id="generationsChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>OpenAI: llamadas por tipo</h3>
        <canvas id="openaiChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Estado de pedidos</h3>
        <canvas id="orderStatusChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    let adminSecret = '';
    let charts = {};

    function authenticate() {
      adminSecret = document.getElementById('secretInput').value.trim();
      if (!adminSecret) return;
      loadDashboard();
    }

    document.getElementById('secretInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') authenticate();
    });

    async function loadDashboard() {
      try {
        const res = await fetch('/api/admin/dashboard', {
          headers: { 'Authorization': `Bearer ${adminSecret}` }
        });
        if (res.status === 401) {
          document.getElementById('authError').textContent = 'Secret incorrecto';
          return;
        }
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);

        document.getElementById('authGate').style.display = 'none';
        document.getElementById('dashboard').classList.add('visible');
        renderDashboard(data);
      } catch (err) {
        document.getElementById('authError').textContent = err.message || 'Error de conexion';
      }
    }

    function fmt(cents, currency) {
      return new Intl.NumberFormat('es-ES', {
        style: 'currency', currency: currency || 'EUR'
      }).format(cents / 100);
    }

    function renderDashboard(d) {
      // AI status
      const aiEl = document.getElementById('aiStatus');
      aiEl.textContent = d.ai_enabled ? 'AI ON' : 'AI OFF';
      aiEl.className = `status-badge ${d.ai_enabled ? 'on' : 'off'}`;

      // KPIs
      const o = d.orders || {};
      document.getElementById('kpiRevenue').textContent = fmt(o.total_revenue_cents || 0, o.currency);
      document.getElementById('kpiRevenue30d').textContent = `30d: ${fmt(o.last_30_days?.revenue_cents || 0, o.currency)}`;
      document.getElementById('kpiOrders').textContent = o.completed_orders || 0;
      document.getElementById('kpiOrders7d').textContent = `7d: ${o.last_7_days?.orders || 0} pedidos`;

      document.getElementById('kpiGenHour').textContent = d.hourly_generations?.count || 0;
      document.getElementById('kpiGenThreshold').textContent = `Umbral: ${d.hourly_generations?.threshold || '--'}`;

      document.getElementById('kpiConversion').textContent = `${d.conversion?.rate_percent || 0}%`;
      document.getElementById('kpiConversionDetail').textContent =
        `${d.conversion?.completed_orders || 0} pedidos / ${d.conversion?.total_generations || 0} generaciones`;

      const cost = d.estimated_cost || {};
      document.getElementById('kpiCost').textContent = `$${(cost.total_usd || 0).toFixed(2)}`;
      document.getElementById('kpiCostDetail').textContent =
        `Img: $${(cost.image_generation_usd || 0).toFixed(2)} | Mod: $${(cost.moderation_usd || 0).toFixed(2)}`;

      const s = d.sessions || {};
      document.getElementById('kpiSessions').textContent = `${s.total_sessions || 0} / ${s.sessions_with_email || 0}`;
      document.getElementById('kpiUniqueIps').textContent = `${s.unique_ips || 0} IPs unicas`;

      // Charts
      renderOrdersChart(o.daily_orders || []);
      renderGenerationsChart(d.generation_history || []);
      renderOpenAIChart(d.openai_usage || {});
      renderOrderStatusChart(o);
    }

    function destroyChart(key) {
      if (charts[key]) { charts[key].destroy(); charts[key] = null; }
    }

    function renderOrdersChart(daily) {
      destroyChart('orders');
      const ctx = document.getElementById('ordersChart').getContext('2d');
      charts.orders = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: daily.map(d => d.day?.slice(5) || ''),
          datasets: [{
            label: 'Pedidos',
            data: daily.map(d => d.orders),
            backgroundColor: 'rgba(129,140,248,0.6)',
            borderRadius: 4,
          }, {
            label: 'Revenue (EUR)',
            data: daily.map(d => d.revenue_cents / 100),
            type: 'line',
            borderColor: '#4ade80',
            backgroundColor: 'transparent',
            yAxisID: 'y1',
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#94a3b8' } } },
          scales: {
            x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, beginAtZero: true },
            y1: { position: 'right', ticks: { color: '#4ade80' }, grid: { display: false }, beginAtZero: true },
          }
        }
      });
    }

    function renderGenerationsChart(history) {
      destroyChart('generations');
      const last24 = history.slice(-24);
      const ctx = document.getElementById('generationsChart').getContext('2d');
      charts.generations = new Chart(ctx, {
        type: 'line',
        data: {
          labels: last24.map(h => h.hour?.split('-').slice(-1)[0] + 'h' || ''),
          datasets: [{
            label: 'Generaciones',
            data: last24.map(h => h.count),
            borderColor: '#818cf8',
            backgroundColor: 'rgba(129,140,248,0.1)',
            fill: true,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#94a3b8' } } },
          scales: {
            x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' }, beginAtZero: true },
          }
        }
      });
    }

    function renderOpenAIChart(usage) {
      destroyChart('openai');
      const ctx = document.getElementById('openaiChart').getContext('2d');
      charts.openai = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Image Gen (OK)', 'Image Gen (Fail)', 'Moderation (OK)', 'Moderation (Fail)'],
          datasets: [{
            data: [
              Math.max(0, usage.image_generation_calls - (usage.failed_calls || 0)),
              usage.failed_calls || 0,
              usage.moderation_calls || 0,
              0,
            ],
            backgroundColor: ['#818cf8', '#f87171', '#4ade80', '#fbbf24'],
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#94a3b8' }, position: 'bottom' } },
        }
      });
    }

    function renderOrderStatusChart(o) {
      destroyChart('orderStatus');
      if (!o || !o.total_orders) return;
      const ctx = document.getElementById('orderStatusChart').getContext('2d');
      charts.orderStatus = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Completados', 'Procesando', 'Fallidos', 'Retenidos'],
          datasets: [{
            data: [o.completed_orders || 0, o.processing_orders || 0, o.failed_orders || 0, o.held_orders || 0],
            backgroundColor: ['#4ade80', '#818cf8', '#f87171', '#fbbf24'],
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#94a3b8' }, position: 'bottom' } },
        }
      });
    }

    // Auto-refresh every 60 seconds
    setInterval(() => { if (adminSecret) loadDashboard(); }, 60000);
  </script>
</body>
</html>
