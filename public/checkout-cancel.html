<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<title>Pago cancelado — genMyTee</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/components.css"/>
<style>
.cancel-page{
  min-height:calc(100vh - 200px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4rem 2rem;text-align:center;
}
.cancel-icon{font-size:4rem;margin-bottom:1.5rem}
.cancel-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,4vw,3rem);font-weight:300;line-height:1.1;
  margin-bottom:1rem;
}
.cancel-desc{font-size:0.88rem;color:var(--muted);line-height:1.7;max-width:420px;margin-bottom:2.5rem}
</style>
</head>
<body>

<nav>
  <div class="nav-top">
    <a href="/" class="nav-logo">genMyTee</a>
    <ul class="nav-center">
      <li><a href="/#productos">Prendas</a></li>
      <li><a href="/#creador" style="color:var(--accent)">Crear mi prenda</a></li>
    </ul>
    <div class="nav-actions"></div>
  </div>
</nav>

<div class="cancel-page">
  <div class="cancel-icon">&#x1F6D2;</div>
  <h1 class="cancel-title">Pago cancelado</h1>
  <p class="cancel-desc">
    No se ha realizado ningún cargo. Tu carrito sigue intacto
    por si quieres completar tu compra más adelante.
  </p>
  <a href="/" class="btn-primary">Volver a la tienda</a>
</div>

<footer>
  <div class="footer-bottom">
    <span>&copy; 2026 genMyTee</span>
  </div>
</footer>
</body>
</html>
